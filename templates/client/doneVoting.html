{% block content %}
<div class="p-8 bg-green-50 border border-green-200 text-green-800 rounded-3xl text-center max-w-md mx-auto shadow-sm my-12">
                <div class="w-16 h-16 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-md">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 class="text-2xl font-bold">Ballot Confirmed!</h3>
                <p class="mt-2 text-sm text-green-700">Your vote has been recorded securely. You cannot vote again.</p>
                {% if receipt_id %}
                <p class="mt-3 text-sm text-green-800">Receipt ID: <span class="font-mono bg-white px-2 py-1 rounded text-gray-900">{{ receipt_id }}</span></p>
                {% endif %}
                <p class="text-xs text-gray-500 mt-4">Logging out automatically in <span id="timer">5</span> seconds...</p>
                <script>
                    let seconds = 5;
                    const timerInterval = setInterval(() => {
                        seconds--;
                        document.getElementById("timer").innerText = seconds;
                        if (seconds <= 0) {
                            clearInterval(timerInterval);
                            // Create a hidden form and submit it via POST
                            const form = document.createElement("form");
                            form.method = "POST";
                            form.action = "/logout";
                            document.body.appendChild(form);
                            form.submit();
                        }
                    }, 1000);
                </script>
            </div>
{% endblock %}
